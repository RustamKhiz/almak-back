name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build Linux binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o myapp-backend ./cmd/main.go

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat << 'EOF' > ~/.ssh/known_hosts
          ${{ secrets.KNOWN_HOSTS }}
          EOF
          chmod 644 ~/.ssh/known_hosts

      - name: Upload binary
        run: |
          scp -i ~/.ssh/id_ed25519 ./myapp-backend ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/myapp-backend

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            sudo mv /tmp/myapp-backend /opt/myapp/backend/myapp-backend &&
            sudo chown myapp:myapp /opt/myapp/backend/myapp-backend &&
            sudo chmod 750 /opt/myapp/backend/myapp-backend &&
            sudo systemctl daemon-reload &&
            sudo systemctl restart myapp-backend &&
            sudo systemctl status myapp-backend --no-pager
          "