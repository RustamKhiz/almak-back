name: Deploy Backend (manual)

on:
  workflow_dispatch:

concurrency:
  group: back-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            go.sum

      - name: Build
        run: |
          go mod tidy
          go test ./...
          go build -o app ./cmd

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload binary
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -P "${SSH_PORT:-22}" ./app "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/app.new"

      - name: Activate & restart service
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "
            set -e
            echo '--- WHOAMI ---'
            whoami
            id
            echo '--- SUDO -L ---'
            sudo -l

            cd '${DEPLOY_PATH}'
            chmod +x app.new
            mv -f app.new app

            sudo -n /usr/bin/systemctl restart almak-back
            sudo -n /usr/bin/systemctl status almak-back --no-pager -l
          "